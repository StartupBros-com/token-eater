name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Provision pinned CI tools
        run: ./scripts/provision-ci-tools.sh

      - name: Validate data files
        run: ./scripts/validate-data.sh

      - name: Shellcheck
        run: |
          set -euo pipefail
          command -v shellcheck >/dev/null
          find . -path './.git' -prune -o -name '*.sh' -print0 | xargs -0 shellcheck --severity=error

      - name: Test shell scripts
        run: |
          bash tests/consent-preflight.sh
          bash tests/release-train.test.sh
          bash tests/workflows.test.sh
