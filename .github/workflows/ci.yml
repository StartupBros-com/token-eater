name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate JSON files
        run: |
          set -euo pipefail
          find . -path './.git' -prune -o -name '*.json' -print | while read -r f; do
            echo "checking $f"
            jq empty "$f"
          done

      - name: Validate YAML files
        run: |
          set -euo pipefail
          find . -path './.git' -prune -o \( -name '*.yaml' -o -name '*.yml' \) -print | while read -r f; do
            echo "checking $f"
            yq eval '.' "$f" > /dev/null
          done

      - name: Shellcheck
        run: |
          set -euo pipefail
          command -v shellcheck >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y shellcheck)
          find . -path './.git' -prune -o -name '*.sh' -print0 | xargs -0 shellcheck --severity=error
