name: Release train

on:
  release:
    types: [published, edited]

permissions:
  contents: read

concurrency:
  group: release-train-token-eater
  cancel-in-progress: false

jobs:
  promote:
    if: github.event.release.draft == false
    runs-on: ubuntu-24.04
    steps:
      - name: Check out release commit
        uses: actions/checkout@ac593985615ec2ede58e132d2e21d2b1cbd6127c
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Resolve latest stable release
        id: stable
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest_id="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
            --jq '[.[] | select(.draft == false and .prerelease == false)] | sort_by(.created_at) | reverse | first | .id')"
          test -n "$latest_id"
          echo "id=$latest_id" >> "$GITHUB_OUTPUT"

      - name: Check out marketplace
        if: github.event.action == 'published' && github.event.release.prerelease == false
        uses: actions/checkout@ac593985615ec2ede58e132d2e21d2b1cbd6127c
        with:
          repository: StartupBros-com/hov-marketplace
          token: ${{ secrets.HOV_MARKETPLACE_PAT }}
          path: hov-marketplace
          fetch-depth: 0

      - name: Promote release and announce
        env:
          EVENT_ACTION: ${{ github.event.action }}
          REPOSITORY: token-eater
          RELEASE_ID: ${{ github.event.release.id }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name || github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_NOTES: ${{ github.event.release.body }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
          RELEASE_DRAFT: ${{ github.event.release.draft }}
          LATEST_STABLE_ID: ${{ steps.stable.outputs.id }}
          SOURCE_ROOT: ${{ github.workspace }}
          SOURCE_SHA: ${{ github.event.release.target_commitish }}
          MARKETPLACE_DIR: ${{ github.workspace }}/hov-marketplace
          MARKETPLACE_VALIDATION_MODE: ${{ vars.HOV_MARKETPLACE_VALIDATION_MODE || 'syntax' }}
          ANNOUNCE_URL: ${{ vars.TOOL_RELEASE_ANNOUNCE_URL }}
          ANNOUNCE_SECRET: ${{ secrets.TOOL_RELEASE_ANNOUNCE_SECRET }}
        run: |
          source_sha="$(git rev-list -n 1 "$RELEASE_TAG")"
          export SOURCE_SHA="$source_sha"
          ./scripts/release-train.sh
